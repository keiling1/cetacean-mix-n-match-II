<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鯨豚對對碰 II</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #333; margin-bottom: 10px; }
        
        /* 控制區塊：計時器與按鈕 */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px; /* 與遊戲容器同寬 */
            max-width: 95vw;
            margin-bottom: 20px;
        }
        #timer {
            font-size: 24px;
            font-weight: bold;
            color: #d32f2f;
            background: #ffebee;
            padding: 10px 20px;
            border-radius: 8px;
        }
        #confirm-btn {
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #1976d2;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #confirm-btn:hover { background-color: #1565c0; }
        #confirm-btn:disabled { background-color: #9e9e9e; cursor: not-allowed; }

        /* 遊戲主體區塊 */
        #game-container {
            display: flex;
            justify-content: space-between;
            width: 800px; /* ★ 加寬整個遊戲版面 */
            max-width: 95vw;
            position: relative;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: opacity 0.3s;
        }
        
        /* 左右欄位設定 */
        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2;
            width: 40%; /* ★ 強制左右各佔40%，中間保留20%畫線空間 */
        }
        
        /* 選項按鈕設定 */
        .item {
            padding: 15px 20px;
            background-color: #D4F6FF;
            border: 2px solid #C4D9FF;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-size: 16px; /* 稍微縮小字體讓長文更好排版 */
            line-height: 1.5; /* 增加行高，閱讀更舒適 */
            transition: all 0.2s;
            user-select: none;
            
            /* ★ 確保文字會換行且不會撐破欄位 */
            width: 100%; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px; /* 設定最小高度，讓左右按鈕看起來更勻稱 */
        }
        .item:hover { background-color: #b2ebf2; }
        .item.selected { background-color: #ffeb3b; border-color: #fbc02d; box-shadow: 0 0 10px rgba(251, 192, 45, 0.5); }
        
        /* SVG 畫布與線條 */
        #svg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        line {
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke 0.3s;
        }
        .line-unconfirmed { stroke: #9e9e9e; } 
        .line-correct { stroke: #4caf50; }    
        .line-wrong { stroke: #f44336; }      

    </style>
</head>
<body>

    <h1>🐋 鯨豚對對碰 II</h1>
    <p>點擊左邊題目，再點右邊答案。連錯可以重連，確認無誤後請按送出！</p>

    <div id="controls">
        <div id="timer">時間: 30秒</div>
        <button id="confirm-btn">確認送出</button>
    </div>

    <div id="game-container">
        <svg id="svg-canvas"></svg>
        <div class="column" id="left-column"></div>
        <div class="column" id="right-column"></div>
    </div>

    <script>
        const gameData = {
            left: [
                { id: 'L1', text: '瓶鼻海豚', matchId: 'R3' },
                { id: 'L2', text: '露脊鼠海豚', matchId: 'R5' },
                { id: 'L3', text: '飛旋海豚', matchId: 'R1' },
                { id: 'L4', text: '大翅鯨', matchId: 'R4' },
                { id: 'L5', text: '抹香鯨', matchId: 'R6' },
                { id: 'L6', text: '虎鯨', matchId: 'R2' }
            ],
            right: [
                { id: 'R1', text: '高度流動且組成多變的群體結構' },
                { id: 'R2', text: '母系領導的長期家族群體' },
                { id: 'R3', text: '2-3隻雄性之間建立緊密的連結，有時存在於更大的同盟體系內' },
                { id: 'R4', text: '因覓食而產生的暫時性集結，群體間的社交關係較為鬆散' },
                { id: 'R5', text: '除交配外，社交互動極少' },
                { id: 'R6', text: '階層式組織，社會結構環環相扣' }
            ]
        };

        let timeLeft = 30; 

        const leftCol = document.getElementById('left-column');
        const rightCol = document.getElementById('right-column');
        const svgCanvas = document.getElementById('svg-canvas');
        const timerDisplay = document.getElementById('timer');
        const confirmBtn = document.getElementById('confirm-btn');

        let selectedLeft = null;
        let isGameOver = false;
        let timerInterval;
        let userAnswers = {}; 

        // 初始化遊戲
        function initGame() {
            // 💡 已經把 .sort(() => Math.random() - 0.5) 拿掉了，現在會照著 R1~R6 的原始順序排
            
            gameData.left.forEach(item => leftCol.appendChild(createItemDiv(item, 'left')));
            
            // 直接讀取 gameData.right，不經過洗牌
            gameData.right.forEach(item => rightCol.appendChild(createItemDiv(item, 'right')));

            confirmBtn.addEventListener('click', endGame);
            startTimer();
        }

        // 啟動計時器
        function startTimer() {
            timerDisplay.textContent = `時間: ${timeLeft}秒`;
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = `時間: ${timeLeft}秒`;
                
                if (timeLeft <= 10) {
                    timerDisplay.style.color = 'white';
                    timerDisplay.style.backgroundColor = '#d32f2f'; 
                }

                if (timeLeft <= 0) {
                    endGame(); 
                }
            }, 1000);
        }

        function createItemDiv(item, side) {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.text;
            div.dataset.id = item.id;
            div.dataset.side = side;
            div.addEventListener('click', () => handleItemClick(div));
            return div;
        }

        function handleItemClick(element) {
            if (isGameOver) return; 

            const side = element.dataset.side;
            const id = element.dataset.id;

            if (side === 'left') {
                if (selectedLeft) selectedLeft.classList.remove('selected');
                selectedLeft = element;
                element.classList.add('selected');
            } 
            else if (side === 'right' && selectedLeft) {
                const leftId = selectedLeft.dataset.id;
                const rightId = id;

                for (let l_id in userAnswers) {
                    if (userAnswers[l_id] === rightId) {
                        delete userAnswers[l_id];
                        removeLine(l_id);
                    }
                }

                userAnswers[leftId] = rightId;
                drawLine(selectedLeft, element, leftId);

                selectedLeft.classList.remove('selected');
                selectedLeft = null;
            }
        }

        function drawLine(el1, el2, leftId) {
            removeLine(leftId); 

            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();

            const x1 = rect1.right - containerRect.left;
            const y1 = rect1.top + (rect1.height / 2) - containerRect.top;
            const x2 = rect2.left - containerRect.left;
            const y2 = rect2.top + (rect2.height / 2) - containerRect.top;

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('id', `line-${leftId}`);
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('class', 'line-unconfirmed');
            svgCanvas.appendChild(line);
        }

        function removeLine(leftId) {
            const line = document.getElementById(`line-${leftId}`);
            if (line) line.remove();
        }

        // 監聽視窗大小改變，自動重畫線條
        window.addEventListener('resize', () => {
            for (let leftId in userAnswers) {
                const rightId = userAnswers[leftId];
                const leftEl = document.querySelector(`.item[data-id="${leftId}"]`);
                const rightEl = document.querySelector(`.item[data-id="${rightId}"]`);
                
                if (leftEl && rightEl) {
                    drawLine(leftEl, rightEl, leftId);
                    
                    if (isGameOver) {
                        const line = document.getElementById(`line-${leftId}`);
                        const correctMatchId = gameData.left.find(item => item.id === leftId).matchId;
                        if (rightId === correctMatchId) {
                            line.setAttribute('class', 'line-correct');
                        } else {
                            line.setAttribute('class', 'line-wrong');
                        }
                    }
                }
            }
        });

        // 遊戲結束與計分結算
        function endGame() {
            if (isGameOver) return;
            isGameOver = true;
            clearInterval(timerInterval); 
            
            confirmBtn.disabled = true;
            confirmBtn.textContent = '已送出';
            document.getElementById('game-container').style.opacity = '0.9';

            let score = 0;
            const total = gameData.left.length;

            gameData.left.forEach(item => {
                const leftId = item.id;
                const correctMatchId = item.matchId;
                const studentAnswer = userAnswers[leftId];
                const line = document.getElementById(`line-${leftId}`);

                if (studentAnswer === correctMatchId) {
                    score++;
                    if (line) line.setAttribute('class', 'line-correct'); 
                } else {
                    if (line) line.setAttribute('class', 'line-wrong'); 
                }
            });

            /* setTimeout(() => {
                if (score === total) {
                    alert(`🎉 太棒了！全對！\n你的成績：${score} / ${total}`);
                } else {
                    alert(`⏱️ 測驗結束！\n你的成績：${score} / ${total}\n（綠線為正確，紅線為錯誤）`);
                }
            }, 300);
            ------------------------------------------------ */
        } 

        initGame();
    </script>
</body>
</html>
